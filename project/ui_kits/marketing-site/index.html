<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cardo Vacation Rentals — Luxury STR management, San Diego</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--cream); }
  a:hover { color: var(--rose); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Pillars.jsx"></script>
<script type="text/babel" src="CaseStudies.jsx"></script>
<script type="text/babel" src="Neighborhoods.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  function App() {
    const leadRef = React.useRef(null);
    const goEstimate = () => {
      const el = leadRef.current;
      if (el) window.scrollTo({ top: window.scrollY + el.getBoundingClientRect().top, behavior: "smooth" });
    };
    const { Header, Hero, StatsBar, Pillars, CaseStudies, Neighborhoods, Testimonials, FAQ, LeadForm, Footer } = window;
    return (
      <React.Fragment>
        <Header onEstimate={goEstimate} />
        <Hero onEstimate={goEstimate} />
        <StatsBar />
        <Pillars />
        <CaseStudies />
        <Neighborhoods />
        <Testimonials />
        <FAQ />
        <LeadForm innerRef={leadRef} />
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
