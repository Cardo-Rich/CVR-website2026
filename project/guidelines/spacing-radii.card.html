<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & Elevation" subtitle="Soft radii and diffuse navy-tinted shadows" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 24px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 84px; height: 64px; background: var(--paper); border: 1px solid var(--line); }
  .lbl { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .r-sm { border-radius: 8px; } .r { border-radius: 14px; } .r-lg { border-radius: 24px; } .r-pill { border-radius: 999px; }
  .e-sm { box-shadow: var(--shadow-sm); border: none; }
  .e-md { box-shadow: var(--shadow-md); border: none; }
  .e-lg { box-shadow: var(--shadow-lg); border: none; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box r-sm"></div><div class="lbl">8px</div></div>
    <div class="item"><div class="box r"></div><div class="lbl">14px</div></div>
    <div class="item"><div class="box r-lg"></div><div class="lbl">24px</div></div>
    <div class="item"><div class="box r-pill" style="width:64px"></div><div class="lbl">pill</div></div>
    <div class="item"><div class="box r-lg e-sm"></div><div class="lbl">sm</div></div>
    <div class="item"><div class="box r-lg e-md"></div><div class="lbl">md</div></div>
    <div class="item"><div class="box r-lg e-lg"></div><div class="lbl">lg</div></div>
  </div>
</body>
</html>
