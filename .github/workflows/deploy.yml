name: Deploy to Firebase Hosting (live)

# TEMPORARY debug version on this branch only (main is untouched): prints the
# CI service-account identity so we can grant Secret Manager roles to the
# right principal. Deploys nothing.
on:
  workflow_dispatch:

jobs:
  debug_ci_identity:
    runs-on: ubuntu-latest
    steps:
      - name: Print CI service account identity
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CARDO_WEBSITE_2026 }}' > "$RUNNER_TEMP/sa.json"
          echo "client_email: $(jq -r .client_email "$RUNNER_TEMP/sa.json")"
          echo "project_id:   $(jq -r .project_id "$RUNNER_TEMP/sa.json")"
