<!-- @dsCard group="Colors" viewport="700x150" name="Brand Core" subtitle="Ink, rose, gold, sea — the load-bearing brand colors" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-body); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 72px; border-radius: 12px; box-shadow: var(--shadow-sm); }
  .name { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 10px; }
  .hex { font-size: 12px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.02em; }
  .sw + .sw { margin-left: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="name">Ink</div><div class="hex">#102234</div></div>
    <div class="sw"><div class="chip" style="background:var(--rose)"></div><div class="name">Rose · accent</div><div class="hex">#ED3C78</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="name">Gold · detail</div><div class="hex">#C19A5B</div></div>
    <div class="sw"><div class="chip" style="background:var(--sea)"></div><div class="name">Sea</div><div class="hex">#1F6F6B</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">Muted</div><div class="hex">#5C6B78</div></div>
  </div>
</body>
</html>
