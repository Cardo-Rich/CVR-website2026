<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); display: grid; grid-template-columns: 1fr 1fr; }
  .pane { padding: 28px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
  .light { background: var(--cream); }
  .dark { background: var(--ink); }
  .pane img { max-height: 92px; width: auto; }
  .stacked img { max-height: 150px; }
</style>
</head>
<body>
  <div class="pane light"><img src="../assets/logo-horizontal-color.png" alt="Cardo horizontal color"></div>
  <div class="pane dark"><img src="../assets/logo-horizontal-white-color.png" alt="Cardo horizontal white"></div>
  <div class="pane light stacked"><img src="../assets/logo-stacked-color.png" alt="Cardo stacked color"></div>
  <div class="pane dark stacked"><img src="../assets/logo-stacked-white.png" alt="Cardo stacked white"></div>
</body>
</html>
