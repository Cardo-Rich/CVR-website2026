<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & Paper" subtitle="Warm cream backgrounds and paper surfaces" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-body); }
  .row { display: flex; gap: 14px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 72px; border-radius: 12px; border: 1px solid var(--line); }
  .name { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 10px; }
  .hex { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="name">Cream · page</div><div class="hex">#F8F3EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-2)"></div><div class="name">Cream 2 · alt</div><div class="hex">#F1E9DC</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="name">Paper · card</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-soft)"></div><div class="name">Ink soft</div><div class="hex">#2A3B4D</div></div>
  </div>
</body>
</html>
